name: Update Projects Section

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: ['main', 'master']

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch repositories
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Fetch all pages of repositories (sorted by created, newest first)
          all_repos="[]"
          page=1

          while true; do
            tmpfile="$(mktemp)"
            if curl --fail-with-body -s \
                 -H "Authorization: token $GITHUB_TOKEN" \
                 -H "Accept: application/vnd.github.v3+json" \
                 "https://api.github.com/users/Mic-360/repos?per_page=100&sort=created&direction=desc&page=$page" \
                 -o "$tmpfile"; then

              count=$(jq length "$tmpfile")
              if [ "$count" -eq 0 ]; then
                rm -f "$tmpfile"
                break
              fi

              all_repos=$(jq -s '.[0] + .[1]' <(echo "$all_repos") "$tmpfile")
              rm -f "$tmpfile"

              if [ "$count" -lt 100 ]; then
                break
              fi

              page=$((page + 1))
            else
              echo "Failed to fetch repositories from GitHub API (page $page)" >&2
              rm -f "$tmpfile"
              exit 1
            fi
          done

          echo "$all_repos" > repos-data.json
          echo "Fetched $(jq length repos-data.json) repositories."

      - name: Generate projects section
        run: node generate-projects.js

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "feat(readme): auto-generate projects section from GitHub repositories [skip ci]" && git push)
